<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Spotify-Web Player:Music for everyone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="assets/logo.png" />
  </head>
  <body>
    <div class="main">
      <div class="sidebar">
        <div class="nav">
          <div class="nav-item">
            <i class="fa-sharp fa-solid fa-house"></i>
            <a href="#">Home</a>
          </div>
          <div class="nav-item search-item">
            <i class="fa-solid fa-magnifying-glass"></i>
            <a href="#">Search</a>
          </div>
        </div>
        <div class="library">
            <div class="option">
                <div class="lib-option nav-item">
                    <img src="assets/library_icon.png">
                    <a href="#">Your Library</a>
                </div>
                <div class="icons">
                    <i class="fa-solid fa-plus"></i>
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </div>
            <div class="lib-boxes">
                <div class="box1"><p>Your first playlist!</p></div>
                <div class="box2">It's easy,we'll help you!</div></p>
                <button class="Badge" onclick="createPlaylist()">Create Playlist</button>
            </div>
            <div class="lib-boxes">
                <div class="box1"><p>Let's find some podcasts to follow</p></div>
                <div class="box2">We'll keep you updated on new episodes</div>
                <button class="Badge"onclick="browsePodcast()">Browse Podcast</button>
            </div>
          </div>
      </div>
      <div class="main-content">  
        <div class="sticky-nav">

          <div class="sticky-nav-icons">

            <img src="./assets/backward_icon.png">
            <img src="./assets/forward_icon.png">
          </div>
          <div class="stickey-nav-options">
            <button class="Badge"onclick="explorePremium()">Explore Premium</button>
            <button class="Badge"onclick="installApp()" ><i class="fa-sharp fa-solid fa-circle-arrow-down"></i>Install App</button>
            <i class="fa-regular fa-user"></i>
          </div>
        </div>
        <div class="cards"></div>
      </div>
      <div class="music-player"></div>
    </div>
  </body>
</html>
